name: Deploy Portfolio

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

        # 2️⃣ Setup Node
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

        # 3️⃣  install
      - name: install dependencies
        run: npm install

        # 4️⃣ Build app
      - name: install dependencies
        run:
          npm run build

          # 4️⃣ deplyo to github
        # Deploy to github pages
      - name: Deploy to github pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
